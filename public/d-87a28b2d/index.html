<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="referrer" content="no-referrer">
    <meta name="googlebot" content="noindex, nofollow">
    <title>Report</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/app.css">
</head>

<body class="flex flex-col h-screen">

    <!-- Password gate -->
    <div id="loginOverlay" style="display: none;">
        <div class="login-card">
            <div class="upload-icon-wrap"><i data-lucide="lock"></i></div>
            <h2 class="upload-title">AURES Competence Model</h2>
            <p class="upload-desc">Zadejte přístupové heslo pro zobrazení dashboardu.</p>
            <input type="password" id="loginPassword" class="login-input" placeholder="Heslo"
                   autocomplete="current-password"
                   onkeydown="if(event.key === 'Enter') handleUnlock()">
            <button id="loginBtn" onclick="handleUnlock()" class="btn-primary-upload">Odemknout</button>
            <p class="login-help">Heslo je sdílené v týmu. Pokud ho neznáte, obraťte se na správce.</p>
            <p id="loginError" class="login-error"></p>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-wrap" onclick="goHome()" role="button" tabindex="0"
             onkeydown="if(event.key === 'Enter' || event.key === ' ') { event.preventDefault(); goHome(); }">
            <div class="logo-mark">
                <div class="logo-mark-bg"></div>
                <span class="logo-mark-inner">A</span>
            </div>
            <div class="logo-text">
                <div class="logo-title">AURES <span>Competence Model</span></div>
                <div id="lastUpdatedText" class="last-updated">Poslední sync: —</div>
            </div>
        </div>

        <div class="header-actions">
            <!-- Country switcher CZ / SK / PL / All -->
            <div id="countryNav" class="country-nav">
                <button id="nav-btn-CZ" onclick="setGlobalCountry('CZ')" class="country-btn">CZ</button>
                <button id="nav-btn-SK" onclick="setGlobalCountry('SK')" class="country-btn">SK</button>
                <button id="nav-btn-PL" onclick="setGlobalCountry('PL')" class="country-btn">PL</button>
                <button id="nav-btn-ALL" onclick="setGlobalCountry('ALL')" class="country-btn">All</button>
            </div>

            <div class="search-wrap">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="globalSearch" placeholder="Hledat kandidáta, manažera, pobočku…"
                       class="search-input" oninput="handleSearch(this.value)">
            </div>

            <button onclick="showDashboardView()" id="dashboardBtn" class="btn-upload hidden">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> <span>Dashboard</span>
            </button>
            <button onclick="showStatsView()" id="statsBtn" class="btn-upload hidden">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i> <span>Statistiky</span>
            </button>
            <button onclick="toggleTheme()" id="themeToggle" class="btn-icon theme-toggle" aria-label="Přepnout tmavý režim">
                <i data-lucide="moon" class="w-4 h-4"></i>
                <span class="theme-toggle-label">Dark</span>
            </button>
            <button onclick="lockDashboard()" id="lockBtn" class="btn-upload hidden">
                <i data-lucide="lock" class="w-4 h-4"></i> <span>Zamknout</span>
            </button>
        </div>
    </header>

    <!-- Main content -->
    <main class="app-main">
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loader"></div>
            <h2 id="loadingTitle">Načítání…</h2>
        </div>

        <!-- Dashboard view -->
        <div id="dashboardView" class="view-container hidden">
            <div class="view-inner">
                <div class="kpi-grid" id="kpiGrid"></div>

                <div class="filter-bar" id="filterBar">
                    <div class="filter-group">
                        <label>Pozice</label>
                        <select id="filterForm" onchange="handleFilterChange()"><option value="ALL">Vše</option></select>
                    </div>
                    <div class="filter-group">
                        <label>Katalog</label>
                        <select id="filterCatalog" onchange="handleFilterChange()"><option value="ALL">Vše</option></select>
                    </div>
                    <div class="filter-group">
                        <label>Pobočka</label>
                        <select id="filterBranch" onchange="handleFilterChange()"><option value="ALL">Vše</option></select>
                    </div>
                    <div class="filter-group">
                        <label>Manažer</label>
                        <select id="filterManager" onchange="handleFilterChange()"><option value="ALL">Vše</option></select>
                    </div>
                    <div class="filter-group" id="filterCountryGroup" style="display: none;">
                        <label>Země</label>
                        <select id="filterCountry" onchange="handleFilterChange()">
                            <option value="ALL">Vše</option>
                            <option value="Czech Republic">Czech Republic</option>
                            <option value="Slovakia">Slovakia</option>
                            <option value="Poland">Poland</option>
                        </select>
                    </div>
                    <button class="filter-reset-btn" onclick="resetFilters()" title="Resetovat filtry">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
                    </button>
                </div>

                <div id="candidatesContainer"></div>
            </div>
        </div>

        <!-- Stats view -->
        <div id="statsView" class="view-container hidden">
            <div class="view-inner">
                <div id="statsContent"></div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none;"></div>

    <!-- JS modules (order matters) -->
    <script src="assets/js/crypto.js"></script>
    <script src="assets/js/core.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/stats.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
