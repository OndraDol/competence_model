name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/deploy_pages.yml'
  workflow_dispatch:
  # Deploy automaticky po úspěšném sync workflow (commit bot-identity jinak
  # netriggeruje push event). Použití workflow_run je pro tento scénář standardní.
  workflow_run:
    workflows: ["Datacruit competence_models sync"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Pokud jsme spuštěni jako reakce na sync workflow, nasazuj jen pokud sync uspěl.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Stage site
        run: |
          mkdir -p _site
          cp -R public/. _site/
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
